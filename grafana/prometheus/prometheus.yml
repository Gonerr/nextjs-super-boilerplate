# source https://prometheus.io/docs/prometheus/latest/getting_started/

global:
  # By default, scrape targets every 60 seconds (less load on small VPS).
  scrape_interval:     60s

  # Attach these labels to any time series or alerts when communicating with
  # external systems (federation, remote storage, Alertmanager).
  external_labels:
    monitor: 'codelab-monitor'

# A scrape configuration containing exactly one endpoint to scrape:
# Here it's Prometheus itself.
scrape_configs:
  # The job name is added as a label `job=<job_name>` to any timeseries scraped from this config.
  - job_name: 'prometheus'

    # Override the global default and scrape targets from this job every 30 seconds.
    scrape_interval: 30s

    static_configs:
    # prometheus
      - targets: ['localhost:9090']
    # node-exporter
      - targets: ['prometheus-node-exporter:9100']
    # cadvisor
      - targets: ['cadvisor:8081']
    # nginx-prometheus-exporter
      - targets: ['nginx-prometheus-exporter:9113']
    # telegraf
      - targets: ['telegraf:9273']  # Telegraf
