# Локальная разработка: только MongoDB.
# Запуск: make up-local. Остановка: make down-local.
# Приложение на хосте (npm run dev): в .env.local укажите MONGO_HOST=localhost, MONGO_PORT=27017.
# Учётные данные ниже должны совпадать с MONGO_USER / MONGO_PASSWORD в .env.local.
version: '3.8'

services:
  mongo:
    container_name: mongo-dev
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: "123123"
    volumes:
      - mongo_data_dev:/data/db
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "2"

volumes:
  mongo_data_dev:
